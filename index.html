<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>슈퍼소닉 대시보드</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f4f4f4;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
    color:#111;
}

.wrap{
    max-width:700px;
    margin:0 auto;
    padding:30px 18px 60px;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#ff1630;
    color:white;
    margin:20px auto 16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:52px;
    font-weight:900;
}

.title{
    text-align:center;
    font-size:42px;
    font-weight:900;
    margin-bottom:10px;
}

.sub{
    text-align:center;
    color:#666;
    margin-bottom:40px;
    font-size:18px;
}

.login-box{
    background:white;
    border-radius:24px;
    padding:30px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
    margin-bottom:24px;
}

.input{
    width:100%;
    padding:18px;
    border:2px solid #ddd;
    border-radius:16px;
    font-size:20px;
    margin-bottom:16px;
}

.login-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    background:#ff1630;
    color:white;
    font-size:22px;
    font-weight:900;
    cursor:pointer;
}

.card{
    background:white;
    border-radius:24px;
    padding:26px;
    margin-bottom:20px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.card-title{
    font-size:28px;
    font-weight:900;
    margin-bottom:12px;
}

.card-desc{
    color:#666;
    margin-bottom:22px;
    font-size:16px;
}

.btn{
    display:block;
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    background:#ff1630;
    color:white;
    font-size:22px;
    font-weight:900;
    cursor:pointer;
}

.hidden{
    display:none;
}

.footer{
    margin-top:30px;
    text-align:center;
    color:#888;
    font-size:15px;
}

.error{
    margin-top:14px;
    color:red;
    font-weight:700;
    text-align:center;
}

</style>
</head>

<body>

<div class="wrap">

<div class="logo">S</div>

<div class="title">
슈퍼소닉
</div>

<div class="sub">
통합 운영 대시보드
</div>

<div class="login-box">

<input
type="password"
id="password"
class="input"
placeholder="비밀번호 입력"
/>

<button class="login-btn" onclick="login()">
접속하기
</button>

<div id="error" class="error"></div>

</div>

<div id="dashboard" class="hidden">

<div class="card">

<div class="card-title">
달서A
</div>

<div class="card-desc">
달서A 실시간 운영 현황
</div>

<button class="btn"
onclick="location.href='달서A_dashboard.html'">
열기
</button>

</div>

<div class="card">

<div class="card-title">
달서B
</div>

<div class="card-desc">
달서B 실시간 운영 현황
</div>

<button class="btn"
onclick="location.href='달서B_dashboard.html'">
열기
</button>

</div>

<div class="card">

<div class="card-title">
중구A
</div>

<div class="card-desc">
중구A 실시간 운영 현황
</div>

<button class="btn"
onclick="location.href='중구A_dashboard.html'">
열기
</button>

</div>

</div>

<div class="footer">
SUPERSONIC DASHBOARD
</div>

</div>

<script>

function login(){

    const pw = document.getElementById("password").value;

    if(pw === "1234"){

        document.getElementById("dashboard")
        .classList.remove("hidden");

        document.querySelector(".login-box")
        .style.display = "none";

    }else{

        document.getElementById("error")
        .innerText = "비밀번호가 틀렸습니다.";

    }

}

</script>

</body>
</html>
